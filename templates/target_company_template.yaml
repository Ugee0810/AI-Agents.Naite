# ====================================
# 応募先企業情報 (Target Company Info)
# ====================================
# 以下の項目を記入してください。
# エージェントがこの情報を基に、最適な面接回答を作成します。
#
# 아래 항목을 기입해주세요.
# 에이전트가 이 정보를 바탕으로 최적의 면접 답변을 작성합니다.

company:
  name: ""            # 企業名 / 기업명
  industry: ""        # 業種 / 업종 (例: IT, 製造, 金融)
  business: ""        # 事業内容 / 사업 내용
  products: []        # 主要製品・サービス / 주요 제품·서비스
    # - "製品A"
    # - "サービスB"
  tech_stack: []      # 使用技術 / 사용 기술 (該当する場合)
    # - "Python"
    # - "AWS"
  culture: ""         # 企業文化・特徴 / 기업 문화·특징
  website: ""         # 企業HP / 기업 홈페이지

position:
  title: ""           # 職種名 / 직무명
  description: ""     # 職務内容 / 직무 내용
  requirements: []    # 必須要件 / 필수 요건
    # - "3年以上の開発経験"
    # - "日本語N2以上"
  preferred: []       # 歓迎要件 / 우대 사항
    # - "チームリーダー経験"
  team_size: ""       # チーム規模 / 팀 규모

appeal_points: []     # 企業の魅力ポイント / 기업 매력 포인트 (自由記述)
  # - "グローバル展開に積極的"
  # - "リモートワーク可"

additional_info: ""   # その他参考情報 / 기타 참고 사항
